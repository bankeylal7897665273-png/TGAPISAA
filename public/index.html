<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram VIP API Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.5);
        }
        h2 {
            margin-bottom: 20px;
            color: #00c6ff;
            background: -webkit-linear-gradient(#0072ff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 10px rgba(0, 198, 255, 0.5);
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #00ffff;
            font-size: 16px;
            outline: none;
            border-bottom: 2px solid #0072ff;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.6);
        }
        button:hover {
            transform: scale(1.05);
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #ffaa00;
            display: none;
        }
        /* Neon Loading Spinner */
        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 10px;
            color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            text-align: left;
        }
        .api-link-box {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px dashed #00ff00;
            font-family: monospace;
            word-break: break-all;
            color: #fff;
            font-size: 13px;
        }
        .instruction {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        #otp-section {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram Device Link</h2>
    
    <div id="input-section">
        <input type="text" id="phone" placeholder="Enter Number with Country Code (e.g., +919876543210)">
        <button onclick="requestTelegramCode()">Get OTP from Telegram</button>
    </div>

    <div id="otp-section">
        <p style="color: #00ffff; margin-bottom: 10px;">Check your Telegram App for the 5-digit code</p>
        <input type="number" id="otp" placeholder="Enter 5-digit OTP">
        <button onclick="verifyTelegramCode()">Login & Generate API</button>
    </div>
    
    <div class="loader" id="loading-spinner"></div>
    <div class="status" id="status-text"></div>
    
    <div class="success-box" id="success-box">
        <h3 style="text-align: center; margin-bottom: 15px;">✅ Telegram Connected!</h3>
        
        <p><strong>Your API URL:</strong></p>
        <div class="api-link-box" id="api-link"></div>
        
        <p style="margin-top: 15px;"><strong>Your API Key (Session String):</strong></p>
        <div class="api-link-box" id="api-key" style="border-color: #00ffff; font-size: 10px;"></div>
        
        <p class="instruction">Send a GET request to the URL above to auto-send messages.</p>
    </div>
</div>

<script>
    async function requestTelegramCode() {
        const phone = document.getElementById('phone').value;
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        
        if (!phone) {
            alert('Please enter your Telegram phone number');
            return;
        }

        document.getElementById('input-section').style.display = 'none';
        spinner.style.display = 'block';
        statusText.style.display = 'block';
        statusText.innerText = "Connecting to Telegram servers...";
        
        try {
            const response = await fetch('/request-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber: phone })
            });
            
            const data = await response.json();
            spinner.style.display = 'none';
            
            if (data.error) {
                statusText.innerText = data.error;
                document.getElementById('input-section').style.display = 'block';
            } else {
                statusText.innerText = data.message;
                document.getElementById('otp-section').style.display = 'block';
            }
        } catch (error) {
            statusText.innerText = "Server Error requesting code.";
            spinner.style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
        }
    }

    async function verifyTelegramCode() {
        const otpCode = document.getElementById('otp').value;
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        
        if (!otpCode) {
            alert('Please enter the OTP');
            return;
        }

        document.getElementById('otp-section').style.display = 'none';
        spinner.style.display = 'block';
        statusText.innerText = "Verifying and Generating API...";
        
        try {
            const response = await fetch('/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otpCode: otpCode })
            });
            
            const data = await response.json();
            spinner.style.display = 'none';
            statusText.style.display = 'none';
            
            if (data.error) {
                statusText.style.display = 'block';
                statusText.innerText = data.error;
                document.getElementById('otp-section').style.display = 'block';
            } else {
                // Success!
                document.getElementById('success-box').style.display = 'block';
                
                // Generate dynamic API URL
                const currentHost = window.location.origin;
                const exampleUrl = `${currentHost}/api/unekid/+910000000000=OTP=8483`;
                
                document.getElementById('api-link').innerText = exampleUrl;
                document.getElementById('api-key').innerText = data.sessionKey;
            }
        } catch (error) {
            statusText.style.display = 'block';
            statusText.innerText = "Verification failed.";
            spinner.style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
        }
    }
</script>

</body>
</html>
